name: wosufemi-netizen

# re-index trigger 2026-07-15
permissions:
  contents: write

on:
  repository_dispatch:
    types: [record-request]
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: 'Direct .m3u8 URL'
        required: true
      duration:
        description: 'Duration in seconds (default 300)'
        required: false
        default: '300'
      chat_id:
        description: 'Telegram chat ID'
        required: true
      filename:
        description: 'Output filename'
        required: false
        default: ''
      human_duration:
        description: 'Human readable duration'
        required: false
        default: ''
      simulate_over_2gb:
        description: 'DEBUG: paksa original dianggap >2GB (test skip-original + still-send-HEVC)'
        required: false
        default: 'false'

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Jakarta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "m3u8_url=${{ github.event.client_payload.m3u8_url }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.client_payload.duration }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ github.event.client_payload.chat_id }}" >> $GITHUB_OUTPUT
            echo "human_duration=${{ github.event.client_payload.human_duration }}" >> $GITHUB_OUTPUT
            echo "duration_label=${{ github.event.client_payload.duration_label }}" >> $GITHUB_OUTPUT
            echo "referer=${{ github.event.client_payload.referer }}" >> $GITHUB_OUTPUT
          else
            echo "m3u8_url=${{ inputs.m3u8_url }}" >> $GITHUB_OUTPUT
            echo "duration=${{ inputs.duration }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ inputs.chat_id }}" >> $GITHUB_OUTPUT
            echo "human_duration=${{ inputs.human_duration }}" >> $GITHUB_OUTPUT
            echo "duration_label=${{ inputs.duration_label }}" >> $GITHUB_OUTPUT
            echo "referer=${{ inputs.referer }}" >> $GITHUB_OUTPUT
            echo "simulate_over_2gb=${{ inputs.simulate_over_2gb }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate filename
        id: fname
        run: |
          NOW=$(date '+%Y-%m-%d_%H-%M-%S')
          DURATION_LABEL="${{ steps.inputs.outputs.duration_label }}"
          FNAME="Wosufemi-Asset-${NOW}-${DURATION_LABEL}.mp4"
          echo "filename=$FNAME" >> $GITHUB_OUTPUT

      - name: Install dependencies (streamlink + N_m3u8DL-RE + ffmpeg)
        run: |
          # 2026-07-22: ffmpeg -c copy / re-encode masih sering bikin video
          # patah/replay di live HLS (Dailymotion sliding window). Tool khusus
          # HLS lebih stabil: streamlink (primary) + N_m3u8DL-RE (fallback).
          # ffmpeg tetap dipakai remux/HEVC saja.
          set +e
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg python3-pip >/dev/null 2>&1 || true
          echo "apt ffmpeg: $(command -v ffmpeg || echo MISSING)"

          # ---- streamlink (primary live HLS recorder) ----
          python3 -m pip install -q --upgrade pip streamlink 2>/dev/null || \
            pip3 install -q --upgrade streamlink 2>/dev/null || true
          echo "streamlink: $(command -v streamlink || echo MISSING) $(streamlink --version 2>/dev/null | head -1)"

          # ---- N_m3u8DL-RE (fallback HLS downloader, bagus di discontinuity) ----
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          NM3U8="/usr/local/bin/N_m3u8DL-RE"
          if [ ! -x "$NM3U8" ]; then
            echo "🔻 Download N_m3u8DL-RE..."
            # latest linux-x64 release (nilaoda)
            API="https://api.github.com/repos/nilaoda/N_m3u8DL-RE/releases/latest"
            URL=$(curl -fsSL -A "$UA" "$API" 2>/dev/null | \
              python3 -c "import sys,json,re; d=json.load(sys.stdin); print(next((a['browser_download_url'] for a in d.get('assets',[]) if re.search(r'linux.*(x64|amd64).*\\.tar\\.gz', a['name'], re.I)),''))" 2>/dev/null)
            if [ -n "$URL" ]; then
              curl -fsSL --retry 3 -A "$UA" "$URL" -o /tmp/nm3u8.tgz && \
              tar -xzf /tmp/nm3u8.tgz -C /tmp && \
              BIN=$(find /tmp -type f -name 'N_m3u8DL-RE' 2>/dev/null | head -1) && \
              if [ -n "$BIN" ]; then sudo install -m 755 "$BIN" "$NM3U8"; fi
            fi
          fi
          echo "N_m3u8DL-RE: $(command -v N_m3u8DL-RE || echo MISSING)"

          # ---- static ffmpeg (HEVC encode) ----
          FFMPEG_STATIC="$(command -v ffmpeg || true)"
          if [ -z "$FFMPEG_STATIC" ]; then
            echo "❌ Tidak ada ffmpeg sama sekali (apt gagal install)."
            exit 1
          fi
          dl_static() {
            curl -fsSL --retry 4 --retry-delay 5 --retry-all-errors -A "$UA" "$1" -o /tmp/ffmpeg.tar.xz
          }
          for U in \
            "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" ; do
            echo "🔻 Mencoba download static ffmpeg: $U"
            if dl_static "$U" && tar -xf /tmp/ffmpeg.tar.xz -C /tmp 2>/dev/null; then
              D=$(ls -d /tmp/ffmpeg-*-amd64-static 2>/dev/null | head -1)
              [ -z "$D" ] && D=$(ls -d /tmp/ffmpeg-master-latest-linux64-gpl 2>/dev/null | head -1)
              if [ -n "$D" ]; then
                if [ -x "$D/ffmpeg" ]; then FFMPEG_STATIC="$D/ffmpeg"
                elif [ -x "$D/bin/ffmpeg" ]; then FFMPEG_STATIC="$D/bin/ffmpeg"
                fi
              fi
              if [ -n "$FFMPEG_STATIC" ] && [ -x "$FFMPEG_STATIC" ]; then
                echo "✅ static ffmpeg siap: $FFMPEG_STATIC"
                break
              fi
            fi
            echo "⚠️  Gagal dari $U, coba mirror berikutnya..."
          done

          echo "FFMPEG_STATIC=$FFMPEG_STATIC" >> $GITHUB_ENV
          "$FFMPEG_STATIC" -version | head -1
          "$FFMPEG_STATIC" -hide_banner -encoders 2>/dev/null | grep -E "libx265|libx264" || echo "⚠️ encoder x26x tidak ditemukan (HEVC akan dilewati, original tetap utuh)"
          set -e

      - name: Record stream
        run: |
          echo "🎬 Starting recording..."
          echo "URL: ${{ steps.inputs.outputs.m3u8_url }}"
          echo "Duration: ${{ steps.inputs.outputs.human_duration }}"
          echo "Output: ${{ steps.fname.outputs.filename }}"

          FILE="${{ steps.fname.outputs.filename }}"
          M3U8="${{ steps.inputs.outputs.m3u8_url }}"
          REFERRER="${{ steps.inputs.outputs.referer }}"
          SRC_DUR_INT="${{ steps.inputs.outputs.duration }}"
          [ "$SRC_DUR_INT" -le 0 ] 2>/dev/null && SRC_DUR_INT=60
          REC_WALL=$(( SRC_DUR_INT + 120 ))
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
          MIN_SIZE=102400
          if [ -n "$REFERRER" ]; then echo "Referer: $REFERRER"; fi
          echo "🛡 Wall-clock guard: auto-stop di ${REC_WALL}s (durasi + 120s buffer)"

          # Progress helper (Telegram)
          start_progress() {
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PHASE_LABEL=Rekam \
              PROGRESS_MSG_FILE=/tmp/wosufemi_rec_msg_id \
              python3 scripts/progress.py start 2>/dev/null || true
          }
          tick_progress() {
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PROGRESS_MSG_FILE=/tmp/wosufemi_rec_msg_id \
              python3 scripts/progress.py progress "$1" 2>/dev/null || true
          }
          done_progress() {
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PHASE_LABEL=Rekam \
              PROGRESS_MSG_FILE=/tmp/wosufemi_rec_msg_id \
              python3 scripts/progress.py done 2>/dev/null || true
          }
          fail_progress() {
            CHAT_ID="${{ steps.inputs.outputs.chat_id }}" FILENAME="$FILE" \
              TG_API_URL="${{ secrets.TG_API_URL || 'http://localhost:8081' }}" \
              BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              PHASE_LABEL=Rekam \
              PROGRESS_MSG_FILE=/tmp/wosufemi_rec_msg_id \
              python3 scripts/progress.py fail 2>/dev/null || true
          }

          # Watch file size → % rough progress (streamlink/N_m3u8 gak punya out_time_ms)
          watch_size_progress() {
            local out="$1" wall="$2" start now elapsed pct last=0
            start=$(date +%s)
            while kill -0 "$WATCH_PID" 2>/dev/null; do
              sleep 5
              now=$(date +%s)
              elapsed=$(( now - start ))
              [ "$elapsed" -gt "$wall" ] && break
              pct=$(( (elapsed * 100) / SRC_DUR_INT ))
              [ "$pct" -gt 99 ] && pct=99
              if [ "$pct" -ge $(( last + 10 )) ]; then
                last=$(( (pct / 10) * 10 ))
                echo "🔴 Rekam ${last}% (elapsed ${elapsed}s)"
                tick_progress "$last"
              fi
            done
          }

          file_ok() {
            [ -f "$1" ] && [ "$(stat -c%s "$1" 2>/dev/null || echo 0)" -ge "$MIN_SIZE" ]
          }

          # Remux ts/mpegts/mkv → mp4 clean (tanpa re-encode kalau sudah h264)
          remux_to_mp4() {
            local src="$1" dst="$2"
            ffmpeg -hide_banner -loglevel error -y -i "$src" \
              -c copy -movflags +faststart \
              -fflags +genpts -avoid_negative_ts make_zero \
              "$dst" 2>/dev/null
            # kalau copy gagal (codec aneh), re-encode ringan
            if ! file_ok "$dst"; then
              ffmpeg -hide_banner -loglevel error -y -i "$src" \
                -c:v libx264 -preset ultrafast -crf 23 \
                -c:a aac -b:a 128k -ac 2 -ar 44100 \
                -vsync cfr -r 25 -movflags +faststart \
                "$dst" 2>/dev/null
            fi
            file_ok "$dst"
          }

          # ========== METHOD 1: ffmpeg LIVE EDGE (realtime, bukan DVR dump) ==========
          # Dailymotion live m3u8 = sliding window BESAR (DVR). Tool yang mulai
          # dari media-sequence pertama = download SEJARAH cepat (1h30m file
          # dalam ~10 menit). ffmpeg default live_start_index = near end
          # (live edge) → nunggu segment baru = wall-clock ≈ durasi rekam.
          try_ffmpeg_live() {
            echo "▶ METHOD 1: ffmpeg LIVE EDGE (realtime streaming)"
            rm -f "$FILE"
            local START_TS
            START_TS=$(date +%s)
            local ARGS=(-hide_banner -loglevel info
              -user_agent "$UA"
              # live edge: jangan ambil dari awal playlist DVR
              -live_start_index -3
              -fflags +genpts+discardcorrupt
              -err_detect ignore_err
              -avoid_negative_ts make_zero
              -max_interleave_delta 0
              -protocol_whitelist "file,http,https,tcp,tls,crypto"
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 30
              -timeout 6000000 -timelimit "$REC_WALL")
            [ -n "$REFERRER" ] && ARGS+=(-referer "$REFERRER")
            # -c copy: realtime, no re-encode (cepat, wall-clock = stream time)
            ARGS+=(-i "$M3U8"
              -c copy
              -movflags +faststart
              -t "$SRC_DUR_INT"
              -progress pipe:1
              "$FILE")
            start_progress
            set +e
            LAST_PCT=-1; NEXT_SEND=0
            timeout -k 30 "$REC_WALL" ffmpeg "${ARGS[@]}" 2>/tmp/ffmpeg_live.err | while IFS='=' read -r k v; do
              if [ "$k" = "out_time_ms" ]; then
                ms=${v%.*}
                [ "$ms" -gt 0 ] 2>/dev/null || continue
                cur=$(( ms / 1000000 ))
                pct=$(( (cur * 100) / SRC_DUR_INT ))
                [ "$pct" -gt 100 ] && pct=100
                now=$(date +%s)
                if [ "$pct" -ge "$((LAST_PCT + 10))" ] && [ "$now" -ge "$NEXT_SEND" ]; then
                  LAST_PCT=$(( (pct / 10) * 10 ))
                  NEXT_SEND=$(( now + 5 ))
                  echo "🔴 Rekam ${LAST_PCT}% (live)"
                  tick_progress "$LAST_PCT"
                fi
              fi
            done
            local rc=$?
            set -e
            local ELAPSED=$(( $(date +%s) - START_TS ))
            echo "ffmpeg-live exit=$rc size=$(stat -c%s "$FILE" 2>/dev/null || echo 0) wall=${ELAPSED}s target=${SRC_DUR_INT}s"
            if ! file_ok "$FILE"; then
              echo "⚠️ ffmpeg-live: file invalid"; tail -15 /tmp/ffmpeg_live.err 2>/dev/null
              rm -f "$FILE"; return 1
            fi
            # Wall-clock guard: live record HARUS memakan waktu ≈ durasi.
            # Kalau selesai < 50% target wall-time → itu DVR dump, bukan live.
            local MIN_WALL=$(( SRC_DUR_INT * 50 / 100 ))
            if [ "$ELAPSED" -lt "$MIN_WALL" ]; then
              echo "⚠️ ffmpeg-live: wall ${ELAPSED}s < min ${MIN_WALL}s (50% target) → DVR dump, TOLAK"
              rm -f "$FILE"; return 1
            fi
            # Durasi file sanity
            local DURATION DUR_INT MIN_DUR
            DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
            DUR_INT=${DURATION%.*}
            MIN_DUR=$(( SRC_DUR_INT * 70 / 100 ))
            echo "ffmpeg-live durasi=${DUR_INT:-0}s min=${MIN_DUR}s"
            if [ -z "$DUR_INT" ] || [ "$DUR_INT" -lt "$MIN_DUR" ]; then
              echo "⚠️ ffmpeg-live: durasi file terlalu pendek"
              rm -f "$FILE"; return 1
            fi
            echo "✅ ffmpeg-live OK (realtime)"
            return 0
          }

          # ========== METHOD 2: streamlink LIVE EDGE (tanpa --hls-live-restart) ==========
          # --hls-live-restart = mulai dari AWAL DVR window → download sejarah cepat.
          # TANPA flag itu = live edge (segment terbaru), nunggu stream.
          try_streamlink() {
            command -v streamlink >/dev/null 2>&1 || return 1
            echo "▶ METHOD 2: streamlink LIVE EDGE (NO --hls-live-restart)"
            rm -f "$FILE" "${FILE%.mp4}.ts" /tmp/sl_out.*
            local HDRS=(--http-header "User-Agent=$UA")
            [ -n "$REFERRER" ] && HDRS+=(--http-header "Referer=$REFERRER")
            local START_TS
            START_TS=$(date +%s)
            start_progress
            set +e
            timeout -k 30 "$REC_WALL" streamlink \
              --stdout \
              --force \
              --default-stream best \
              --stream-segment-threads 1 \
              --stream-timeout 60 \
              --hls-live-edge 3 \
              --hls-segment-stream-data \
              --retry-streams 3 \
              --retry-max 10 \
              --retry-open 3 \
              "${HDRS[@]}" \
              "hls://$M3U8" best \
              2>/tmp/streamlink.err | \
              timeout -k 15 "$REC_WALL" ffmpeg -hide_banner -loglevel error -y \
                -fflags +genpts+discardcorrupt -err_detect ignore_err \
                -i pipe:0 \
                -c copy -movflags +faststart \
                -t "$SRC_DUR_INT" \
                "$FILE" 2>/tmp/streamlink_ffmpeg.err
            local rc=${PIPESTATUS[0]}
            set -e
            local ELAPSED=$(( $(date +%s) - START_TS ))
            echo "streamlink exit=$rc size=$(stat -c%s "$FILE" 2>/dev/null || echo 0) wall=${ELAPSED}s"
            if ! file_ok "$FILE"; then
              echo "⚠️ streamlink: file tidak valid"; tail -20 /tmp/streamlink.err 2>/dev/null
              rm -f "$FILE"; return 1
            fi
            local MIN_WALL=$(( SRC_DUR_INT * 50 / 100 ))
            if [ "$ELAPSED" -lt "$MIN_WALL" ]; then
              echo "⚠️ streamlink: wall ${ELAPSED}s < min ${MIN_WALL}s → DVR dump, TOLAK"
              rm -f "$FILE"; return 1
            fi
            local DURATION DUR_INT MIN_DUR
            DURATION=$(ffprobe -v error -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
            DUR_INT=${DURATION%.*}
            MIN_DUR=$(( SRC_DUR_INT * 70 / 100 ))
            echo "streamlink durasi=${DUR_INT}s (target=${SRC_DUR_INT}s, min=${MIN_DUR}s)"
            if [ -z "$DUR_INT" ] || [ "$DUR_INT" -lt "$MIN_DUR" ]; then
              echo "⚠️ streamlink: durasi ${DUR_INT:-0}s < min ${MIN_DUR}s — TIDAK VALID"
              rm -f "$FILE"; return 1
            fi
            echo "✅ streamlink OK (live edge)"
            return 0
          }

          # ========== METHOD 3: N_m3u8DL-RE live record ==========
          try_nm3u8() {
            command -v N_m3u8DL-RE >/dev/null 2>&1 || return 1
            echo "▶ METHOD 3: N_m3u8DL-RE live-record (edge)"
            rm -f "$FILE" /tmp/nm3u8_out*
            local OUTDIR="/tmp/nm3u8_work"
            rm -rf "$OUTDIR"; mkdir -p "$OUTDIR"
            local HDRS=(--header "User-Agent: $UA")
            [ -n "$REFERRER" ] && HDRS+=(--header "Referer: $REFERRER")
            local START_TS LIM
            START_TS=$(date +%s)
            start_progress
            set +e
            LIM=$(printf '%02d:%02d:%02d' $((SRC_DUR_INT/3600)) $(((SRC_DUR_INT%3600)/60)) $((SRC_DUR_INT%60)))
            # --live-wait-time 0: jangan nunggu lama sebelum start
            # live mode: tool harus follow live edge (bukan full DVR dump)
            timeout -k 30 "$REC_WALL" N_m3u8DL-RE "$M3U8" \
              --save-dir "$OUTDIR" \
              --save-name "rec" \
              --tmp-dir "$OUTDIR/tmp" \
              --thread-count 2 \
              --download-retry-count 5 \
              --http-request-timeout 30 \
              --live-record-limit "$LIM" \
              --live-real-time-merge true \
              --live-keep-segments false \
              --live-pipe-mux false \
              --check-segments-count false \
              --auto-select true \
              --no-log \
              "${HDRS[@]}" \
              2>/tmp/nm3u8.err
            local rc=$?
            set -e
            local ELAPSED=$(( $(date +%s) - START_TS ))
            local FOUND
            FOUND=$(find "$OUTDIR" -type f \( -name '*.mp4' -o -name '*.ts' -o -name '*.mkv' -o -name '*.m4s' \) 2>/dev/null | head -1)
            echo "N_m3u8DL-RE exit=$rc found=${FOUND:-none} wall=${ELAPSED}s"
            if [ -n "$FOUND" ] && [ "$(stat -c%s "$FOUND" 2>/dev/null || echo 0)" -ge "$MIN_SIZE" ]; then
              if [[ "$FOUND" == *.mp4 ]]; then
                mv "$FOUND" "$FILE"
              else
                remux_to_mp4 "$FOUND" "$FILE" || mv "$FOUND" "$FILE"
              fi
            fi
            if ! file_ok "$FILE"; then
              echo "⚠️ N_m3u8DL-RE gagal:"; tail -20 /tmp/nm3u8.err 2>/dev/null
              rm -f "$FILE"; return 1
            fi
            local MIN_WALL=$(( SRC_DUR_INT * 50 / 100 ))
            if [ "$ELAPSED" -lt "$MIN_WALL" ]; then
              echo "⚠️ N_m3u8DL-RE: wall ${ELAPSED}s < min ${MIN_WALL}s → DVR dump, TOLAK"
              rm -f "$FILE"; return 1
            fi
            echo "✅ N_m3u8DL-RE OK"
            return 0
          }

          # ========== METHOD 4: ffmpeg re-encode (last resort, still live edge) ==========
          try_ffmpeg() {
            echo "▶ METHOD 4: ffmpeg re-encode LIVE EDGE (last resort)"
            rm -f "$FILE"
            local START_TS
            START_TS=$(date +%s)
            local ARGS=(-hide_banner -loglevel info
              -user_agent "$UA"
              -live_start_index -3
              -fflags +genpts+discardcorrupt
              -err_detect ignore_err
              -avoid_negative_ts make_zero
              -max_interleave_delta 0
              -protocol_whitelist "file,http,https,tcp,tls,crypto"
              -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 30
              -timeout 6000000 -timelimit "$REC_WALL")
            [ -n "$REFERRER" ] && ARGS+=(-referer "$REFERRER")
            ARGS+=(-i "$M3U8"
              -c:v libx264 -preset ultrafast -tune zerolatency -crf 23
              -vsync cfr -r 25 -async 1
              -g 50 -keyint_min 50 -sc_threshold 0
              -force_key_frames "expr:gte(t,n_forced*2)"
              -c:a aac -b:a 128k -ac 2 -ar 44100
              -movflags +faststart
              -max_muxing_queue_size 1024
              -t "$SRC_DUR_INT"
              -progress pipe:1
              "$FILE")
            start_progress
            set +e
            LAST_PCT=-1; NEXT_SEND=0
            timeout -k 30 "$REC_WALL" ffmpeg "${ARGS[@]}" 2>/dev/null | while IFS='=' read -r k v; do
              if [ "$k" = "out_time_ms" ]; then
                ms=${v%.*}
                [ "$ms" -gt 0 ] 2>/dev/null || continue
                cur=$(( ms / 1000000 ))
                pct=$(( (cur * 100) / SRC_DUR_INT ))
                [ "$pct" -gt 100 ] && pct=100
                now=$(date +%s)
                if [ "$pct" -ge "$((LAST_PCT + 10))" ] && [ "$now" -ge "$NEXT_SEND" ]; then
                  LAST_PCT=$(( (pct / 10) * 10 ))
                  NEXT_SEND=$(( now + 5 ))
                  echo "🔴 Rekam ${LAST_PCT}%"
                  tick_progress "$LAST_PCT"
                fi
              fi
            done
            local rc=$?
            set -e
            local ELAPSED=$(( $(date +%s) - START_TS ))
            echo "ffmpeg exit=$rc size=$(stat -c%s "$FILE" 2>/dev/null || echo 0) wall=${ELAPSED}s"
            if ! file_ok "$FILE"; then return 1; fi
            local MIN_WALL=$(( SRC_DUR_INT * 50 / 100 ))
            if [ "$ELAPSED" -lt "$MIN_WALL" ]; then
              echo "⚠️ ffmpeg: wall ${ELAPSED}s < min ${MIN_WALL}s → DVR dump, TOLAK"
              rm -f "$FILE"; return 1
            fi
            return 0
          }

          # ---- try cascade: LIVE EDGE first ----
          SUCCESS=0
          METHOD_USED=""
          for ATTEMPT in 1 2 3; do
            echo "──────────────────────────────────────"
            echo "🎬 Recording attempt ${ATTEMPT}/3 (LIVE EDGE, bukan DVR dump)"
            echo "──────────────────────────────────────"
            if try_ffmpeg_live; then SUCCESS=1; METHOD_USED=ffmpeg-live; break; fi
            if try_streamlink; then SUCCESS=1; METHOD_USED=streamlink; break; fi
            if try_nm3u8; then SUCCESS=1; METHOD_USED=N_m3u8DL-RE; break; fi
            if try_ffmpeg; then SUCCESS=1; METHOD_USED=ffmpeg-reencode; break; fi
            echo "❌ Attempt ${ATTEMPT} semua method gagal."
            [ "$ATTEMPT" -lt 3 ] && sleep 15
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "❌ Semua percobaan gagal. Tidak ada file valid."
            fail_progress
            exit 1
          fi

          echo "🔴 Rekam 100% (method=$METHOD_USED)"
          done_progress
          echo "✅ Recording complete via $METHOD_USED!"
          ls -lh "$FILE"
          echo "FILE_SIZE=$(ls -lh "$FILE" 2>/dev/null | awk '{print $5}')" >> $GITHUB_ENV
          echo "ORIG_BYTES=$(stat -c%s "$FILE" 2>/dev/null || echo 0)" >> $GITHUB_ENV
          echo "REC_METHOD=$METHOD_USED" >> $GITHUB_ENV

      - name: Sanity fixup — remux + validate (anti patah/replay)
        if: success()
        run: |
          set +e
          FILE="${{ steps.fname.outputs.filename }}"
          echo "🧪 Sanity: ffprobe durasi file rekaman..."
          DUR_PROBE=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          DUR_INT=${DUR_PROBE%.*}
          if [ -z "$DUR_INT" ] || [ "$DUR_INT" -lt 10 ]; then
            echo "⚠️  Durasi probe abnormal (${DUR_PROBE:-0}s) — file kemungkinan corrupt, skip fixup"
          else
            echo "✅ Durasi: ${DUR_INT}s ($(printf '%02d:%02d:%02d' $((DUR_INT/3600)) $(((DUR_INT%3600)/60)) $((DUR_INT%60))))"
          fi
          # Cek ada keyframe tiap <= 2.5s (kalau ada gap > 2.5s, player bisa stutter
          # saat init / rebuffer)
          echo "🧪 Sanity: cek jarak keyframe..."
          ffprobe -v error -select_streams v:0 -skip_frame nokey -show_entries \
            frame=pkt_pts_time -of csv=p=0 "$FILE" 2>/dev/null | head -200 > /tmp/kf.txt
          if [ -s /tmp/kf.txt ]; then
            MAX_GAP=$(awk 'NR>1 {d=$1-prev; if(d>max) max=d} {prev=$1} END{print max+0}' /tmp/kf.txt)
            echo "   Max gap antar keyframe: ${MAX_GAP}s"
            if awk "BEGIN{exit !($MAX_GAP > 3)}"; then
              echo "⚠️  Keyframe gap >3s terdeteksi — re-remux untuk fix index"
              TMP="${FILE%.mp4}.remux.mp4"
              ffmpeg -hide_banner -loglevel error -y -i "$FILE" -c copy -movflags +faststart "$TMP" 2>/dev/null
              if [ -s "$TMP" ] && [ "$(stat -c%s "$TMP")" -gt 102400 ]; then
                mv "$TMP" "$FILE"
                echo "✅ Remux selesai, file diperbaiki"
              else
                rm -f "$TMP"
                echo "⚠️  Remux gagal, pakai file original"
              fi
            else
              echo "✅ Keyframe OK, no remux needed"
            fi
          fi
          set -e

      - name: Extract metadata and thumbnail
        id: meta
        if: success()
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          THUMB="${FILE%.mp4}.jpg"

          # ---- Probe metadata (semua defensif, gagal = nilai default) ----
          DUR_RAW=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          [ -z "$DUR_RAW" ] && DUR_RAW=0
          DUR_INT=${DUR_RAW%.*}
          [ -z "$DUR_INT" ] && DUR_INT=0
          case "$DUR_INT" in
            ''|*[!0-9]*) DUR_INT=0 ;;
          esac
          REAL_DURATION=$(printf '%02d:%02d:%02d' \
            $((DUR_INT/3600)) $(((DUR_INT%3600)/60)) $((DUR_INT%60)))

          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          if [ -n "$WIDTH" ] && [ -n "$HEIGHT" ]; then
            RESOLUTION="${WIDTH}x${HEIGHT}"
          else
            RESOLUTION="?"
          fi

          VCODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          [ -z "$VCODEC" ] && VCODEC="?"

          BR_RAW=$(ffprobe -v error -show_entries format=bit_rate \
            -of default=noprint_wrappers=1:nokey=1 "$FILE" 2>/dev/null | head -1)
          case "$BR_RAW" in
            ''|*[!0-9]*) VBITRATE="?" ;;
            *) VBITRATE="$(awk "BEGIN{printf \"%.1f Mbps\", ${BR_RAW}/1000000}")" ;;
          esac

          FILE_SIZE=$(ls -lh "$FILE" 2>/dev/null | awk '{print $5}')
          [ -z "$FILE_SIZE" ] && FILE_SIZE="?"

          echo "📊 Metadata:"
          echo "   Durasi asli : $REAL_DURATION"
          echo "   Resolusi    : $RESOLUTION"
          echo "   Codec       : $VCODEC"
          echo "   Bitrate     : $VBITRATE"
          echo "   Ukuran      : $FILE_SIZE"

          # ---- Thumbnail dari tengah video (hindari frame hitam di awal) ----
          if [ "$DUR_INT" -gt 6 ]; then
            SEEK=$((DUR_INT / 2))
          else
            SEEK=1
          fi
          echo "🖼  Membuat thumbnail (seek ${SEEK}s)..."

          HAS_THUMB=0
          ffmpeg -hide_banner -loglevel error -y -ss "$SEEK" -i "$FILE" \
            -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true

          # Fallback: kalau seek tengah gagal, coba dari detik ke-1
          if [ ! -s "$THUMB" ]; then
            echo "⚠️  Thumbnail tengah gagal, fallback ke detik 1..."
            ffmpeg -hide_banner -loglevel error -y -ss 1 -i "$FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true
          fi

          # Fallback terakhir: frame pertama tanpa seek
          if [ ! -s "$THUMB" ]; then
            echo "⚠️  Fallback terakhir, frame pertama..."
            ffmpeg -hide_banner -loglevel error -y -i "$FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$THUMB" 2>/dev/null || true
          fi

          if [ -s "$THUMB" ]; then
            HAS_THUMB=1
            echo "✅ Thumbnail dibuat: $THUMB ($(stat -c%s "$THUMB" 2>/dev/null || echo 0) bytes)"
          else
            echo "⚠️  Thumbnail tidak bisa dibuat (dilewati, tidak menggagalkan job)."
            rm -f "$THUMB"
          fi

          # ---- Export ke env untuk step berikutnya ----
          {
            echo "REAL_DURATION=$REAL_DURATION"
            echo "RESOLUTION=$RESOLUTION"
            echo "VCODEC=$VCODEC"
            echo "VBITRATE=$VBITRATE"
            echo "FILE_SIZE=$FILE_SIZE"
            echo "THUMB_FILE=$THUMB"
            echo "HAS_THUMB=$HAS_THUMB"
          } >> $GITHUB_ENV

      - name: Segment ORIGINAL kalau >2GB (biar bisa dikirim utuh)
        if: success()
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          ORIG_BYTES=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
          if [ "${{ steps.inputs.outputs.simulate_over_2gb }}" = "true" ]; then
            ORIG_BYTES=3221225472
          fi
          MAX=$((2*1024*1024*1024))
          if [ "$ORIG_BYTES" -gt "$MAX" ]; then
            echo "🧩 ORIGINAL $(numfmt --to=iec $ORIG_BYTES) > 2GB — pecah jadi segment <1.9GB"
            SEG_DIR="segments"
            rm -rf "$SEG_DIR"; mkdir -p "$SEG_DIR"
            # -f segment: potong by size (~1.9GB), -c copy (tanpa re-encode)
            ffmpeg -hide_banner -y -i "$FILE" \
              -c copy -map 0 \
              -f segment -segment_format mp4 \
              -reset_timestamps 1 \
              -fs 2000000000 \
              "$SEG_DIR/part-%03d.mp4" 2>/dev/null || true
            # verify ada segment
            if ls "$SEG_DIR"/part-*.mp4 >/dev/null 2>&1; then
              echo "SEGMENTED=1" >> $GITHUB_ENV
              echo "SEG_DIR=$SEG_DIR" >> $GITHUB_ENV
              echo "✅ Segment siap:"
              ls -lh "$SEG_DIR"/part-*.mp4
            else
              echo "⚠️ Segment gagal, fallback kirim file utuh (maybe >2GB dilewati)"
              echo "SEGMENTED=0" >> $GITHUB_ENV
            fi
          else
            echo "✅ ORIGINAL $(numfmt --to=iec $ORIG_BYTES) ≤ 2GB, tidak perlu segment"
            echo "SEGMENTED=0" >> $GITHUB_ENV
          fi

      - name: Buat .txt (update log kecil) + Release ringan
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          TAG="wosufemi-$(date +%s)"
          TITLE="wosufemi-netizen — $(date '+%Y-%m-%d %H:%M:%S') WIB (${{ steps.inputs.outputs.duration_label }})"

          # --- Extract SEMUA URL segmen .ts dari playlist (bukan cuma head -1) ---
          # User: ratusan–ribuan baris .ts di .txt release = OK (log kecil vs video).
          # source_m3u8 = URL yang di-paste di /record
          # source_ts = list absolute URL semua .ts di media playlist (snapshot saat release)
          M3U8="${{ steps.inputs.outputs.m3u8_url }}"
          REF="${{ steps.inputs.outputs.referer }}"
          resolve_url() {
            b="$1"; r="$2"
            case "$r" in
              http*) echo "$r"; return ;;
            esac
            d="${b%/*}"
            case "$r" in
              /*) sh=$(echo "$b" | sed -E 's#^(https?://[^/]+).*#\1#'); echo "$sh$r" ;;
              *) echo "$d/$r" ;;
            esac
          }
          fetch_h() {
            if [ -n "$REF" ]; then
              curl -s -L --max-time 30 -H "Referer: $REF" -H "User-Agent: Mozilla/5.0" "$1"
            else
              curl -s -L --max-time 30 -H "User-Agent: Mozilla/5.0" "$1"
            fi
          }
          PL=$(fetch_h "$M3U8")
          MEDIA_BASE="$M3U8"
          # master playlist? ambil variant pertama (prefer 720 kalau ada di path)
          VAR=$(echo "$PL" | grep -E '\.m3u8' | grep -i '720' | head -1)
          [ -z "$VAR" ] && VAR=$(echo "$PL" | grep -E '\.m3u8' | head -1)
          if [ -n "$VAR" ] && [ "$VAR" != "$M3U8" ]; then
            MEDIA_URL="$(resolve_url "$M3U8" "$VAR")"
            PL=$(fetch_h "$MEDIA_URL")
            MEDIA_BASE="$MEDIA_URL"
          fi
          # kumpulkan SEMUA baris .ts (absolute)
          TS_LIST_FILE=$(mktemp)
          echo "$PL" | grep -E '\.ts' | while IFS= read -r line; do
            [ -z "$line" ] && continue
            # skip tags
            case "$line" in \#*) continue ;; esac
            resolve_url "$MEDIA_BASE" "$line"
          done > "$TS_LIST_FILE"
          TS_COUNT=$(wc -l < "$TS_LIST_FILE" | tr -d ' ')
          FIRST_TS=$(head -1 "$TS_LIST_FILE")
          [ -z "$FIRST_TS" ] && FIRST_TS="$M3U8"
          echo "TS_COUNT=$TS_COUNT FIRST_TS=${FIRST_TS:0:80}..."
          echo "TS_URL=$FIRST_TS" >> $GITHUB_ENV
          echo "TS_COUNT=$TS_COUNT" >> $GITHUB_ENV

          # .txt = metadata + m3u8 asli + SEMUA segmen .ts (boleh ratusan/ribuan baris)
          TXT="${FILE%.mp4}.txt"
          {
            echo "# wosufemi-netizen — record update"
            echo "file: ${FILE}"
            echo "size: ${FILE_SIZE}"
            echo "durasi: ${REAL_DURATION}"
            echo "resolusi: ${RESOLUTION}"
            echo "codec: ${VCODEC}"
            echo "bitrate: ${VBITRATE}"
            echo "source_m3u8: $M3U8"
            echo "media_playlist: $MEDIA_BASE"
            echo "source_ts_count: ${TS_COUNT:-0}"
            echo "source_url: $FIRST_TS"
            echo "referer: ${{ steps.inputs.outputs.referer }}"
            echo "status: sent-to-telegram"
            echo "rec_method: ${REC_METHOD:-unknown}"
            echo "recorded_at: $(date '+%Y-%m-%dT%H:%M:%S %z')"
            echo ""
            echo "# source_ts: all segment URLs (snapshot at release; live DVR may expire)"
            if [ -s "$TS_LIST_FILE" ]; then
              cat "$TS_LIST_FILE"
            else
              echo "# (no .ts lines resolved — playlist empty or fetch failed)"
            fi
          } > "$TXT"
          rm -f "$TS_LIST_FILE"

          NOTES="wosufemi-netizen — record update (lightweight log). Metadata + URL sumber disimpan, video dikirim ke Telegram (tidak disimpan di GitHub)."

          # Release cuma berisi .txt (kecil, persist sebagai update log)
          gh release create "$TAG" --repo "${{ github.repository }}" \
            --title "${TITLE}" --notes "${NOTES}" \
            "$TXT" 2>/dev/null || \
          gh release create "$TAG" --repo "${{ github.repository }}" \
            --title "${TITLE}" --notes "${NOTES}" "$TXT"
          echo "✅ Created release $TAG (asset: $(ls -lh "$TXT" | awk '{print $5}') .txt)"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "TXT_FILE=$TXT" >> $GITHUB_ENV

      - name: Start local Bot API Server (allow >50MB uploads)
        if: success()
        continue-on-error: true
        env:
          TELEGRAM_API_ID: ${{ secrets.TG_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TG_API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set +e
          docker rm -f tg-bot-api >/dev/null 2>&1 || true
          rm -rf /tmp/tg-bot-api && mkdir -p /tmp/tg-bot-api
          docker run -d --name tg-bot-api -p 8081:8081 \
            -e TELEGRAM_API_ID="$TELEGRAM_API_ID" \
            -e TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
            -e TELEGRAM_LOCAL=1 \
            -v /tmp/tg-bot-api:/var/lib/telegram-bot-api \
            aiogram/telegram-bot-api:latest \
            --local -m 2097152000 --dir /var/lib/telegram-bot-api --http-port 8081 --verbosity=2
          echo "⏳ Menunggu Bot API Server siap (hingga 90s)..."
          for i in $(seq 1 45); do
            CODE=$(curl -s -o /tmp/getme.json -w "%{http_code}" "http://localhost:8081/bot${{ secrets.BOT_TOKEN }}/getMe" 2>/dev/null)
            echo "  attempt $i: HTTP $CODE -> $(cat /tmp/getme.json 2>/dev/null | head -c 300)"
            if [ "$CODE" = "200" ]; then
              echo "✅ Bot API Server ready"
              break
            fi
            sleep 2
          done
          echo "================ SERVER LOG (docker logs) ================"
          docker logs --tail 60 tg-bot-api 2>&1 || echo "(no docker logs)"
          echo "================ END SERVER LOG ================"

      - name: Notify Telegram — ORIGINAL (rekam selesai)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          HUMAN_DUR: ${{ steps.inputs.outputs.human_duration }}
          TAG: ${{ env.TAG }}
          JOB_STATUS: ${{ job.status }}
          REAL_DURATION: ${{ env.REAL_DURATION }}
          RESOLUTION: ${{ env.RESOLUTION }}
          VCODEC: ${{ env.VCODEC }}
          VBITRATE: ${{ env.VBITRATE }}
          FILE_SIZE: ${{ env.FILE_SIZE }}
          ORIG_BYTES: ${{ env.ORIG_BYTES }}
          THUMB_FILE: ${{ env.THUMB_FILE }}
          HAS_THUMB: ${{ env.HAS_THUMB }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          PHASE: original
        run: python3 scripts/notify.py

      - name: Encode to HEVC 10-bit (copy tambahan, asli tetap utuh)
        id: hevc
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          DURATION_SEC: ${{ steps.inputs.outputs.duration }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
        run: |
          FILE="${{ steps.fname.outputs.filename }}"
          HEVC_FILE="${FILE%.mp4}-h265-10bit.mp4"
          FFMPEG_STATIC="${{ env.FFMPEG_STATIC }}"
          echo "🎞  Encoding HEVC 10-bit (main10, yuv420p10le, CRF 28)..."

          # Durasi untuk progress bar: pakai durasi request (DURATION_SEC),
          # BUKAN ffprobe — hasil -c copy dari live stream sering N/A.
          SRC_DUR_INT="${DURATION_SEC:-60}"
          [ "$SRC_DUR_INT" -le 0 ] && SRC_DUR_INT=60

          # Start 1 pesan progress (edit-message, bukan spam)
          python3 scripts/progress.py start || true

          # Pipeline: ffmpeg dengan -progress pipe, parse out_time_ms -> persen
          LAST_PCT=-1
          NEXT_SEND=0
          "$FFMPEG_STATIC" -hide_banner -y -i "$FILE" \
            -c:v libx265 -profile:v main10 -pix_fmt yuv420p10le \
            -crf 28 -preset fast -tag:v hvc1 \
            -c:a copy \
            -progress pipe:1 \
            "$HEVC_FILE" 2>/dev/null | while IFS='=' read -r k v; do
            if [ "$k" = "out_time_ms" ]; then
              ms=${v%.*}
              echo "DEBUG out_time_ms raw=[$v] ms=[$ms] SRC_DUR_INT=[$SRC_DUR_INT]" >&2
              [ "$ms" -gt 0 ] 2>/dev/null || { echo "DEBUG skip non-numeric ms" >&2; continue; }
              cur=$(( ms / 1000000 ))
              pct=$(( (cur * 100) / SRC_DUR_INT ))
              [ "$pct" -gt 100 ] && pct=100
              now=$(date +%s)
              if [ "$pct" -ge "$((LAST_PCT + 10))" ] && [ "$now" -ge "$NEXT_SEND" ]; then
                LAST_PCT=$(( (pct / 10) * 10 ))
                NEXT_SEND=$(( now + 5 ))
                echo "🔄 HEVC encode ${LAST_PCT}%"
                CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" \
                  BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/wosufemi_progress_msg_id \
                  python3 scripts/progress.py progress "$LAST_PCT" || true
              fi
            fi
          done
          # Pastikan 100% lalu ubah jadi pesan final (edit, bukan chat baru)
          echo "🔄 HEVC encode 100%"
          CHAT_ID="$CHAT_ID" FILENAME="$FILE" TG_API_URL="$TG_API_URL" \
            BOT_TOKEN="$BOT_TOKEN" PROGRESS_MSG_FILE=/tmp/wosufemi_progress_msg_id \
            python3 scripts/progress.py done || true
          if [ -s "$HEVC_FILE" ]; then
            echo "✅ HEVC 10-bit selesai: $(ls -lh "$HEVC_FILE" | awk '{print $5}')"
            echo "HEVC_FILE=$HEVC_FILE" >> $GITHUB_ENV
            echo "HEVC_SIZE=$(ls -lh "$HEVC_FILE" | awk '{print $5}')" >> $GITHUB_ENV
            # Metadata asli hasil encode (ffprobe)
            HDUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            HDUR_INT=${HDUR%.*}
            [ -z "$HDUR_INT" ] && HDUR_INT=0
            HEVC_DUR=$(printf '%02d:%02d:%02d' $((HDUR_INT/3600)) $(((HDUR_INT%3600)/60)) $((HDUR_INT%60)))
            HW=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            HH=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HW" ] && [ -n "$HH" ] && echo "HEVC_RES=${HW}x${HH}" >> $GITHUB_ENV
            HCV=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HCV" ] && echo "HEVC_VCODEC=$HCV" >> $GITHUB_ENV
            HPF=$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            [ -n "$HPF" ] && echo "HEVC_PIX_FMT=$HPF" >> $GITHUB_ENV
            echo "HEVC pixel format: ${HPF:-unknown}"
            HBR=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 "$HEVC_FILE" 2>/dev/null | head -1)
            case "$HBR" in
              ''|*[!0-9]*) ;;
              *) echo "HEVC_VBITRATE=$(awk "BEGIN{printf \"%.1f Mbps\", ${HBR}/1000000}")" >> $GITHUB_ENV ;;
            esac
            echo "HEVC_DUR=$HEVC_DUR" >> $GITHUB_ENV
            # Thumbnail khusus HEVC 10-bit (dari hasil encode, bukan punya original)
            HEVC_THUMB="${HEVC_FILE%.mp4}.jpg"
            HDUR_INT2=${HDUR_INT:-0}
            HSEEK=1
            [ "$HDUR_INT2" -gt 6 ] && HSEEK=$((HDUR_INT2 / 2))
            "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss "$HSEEK" -i "$HEVC_FILE" \
              -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            if [ ! -s "$HEVC_THUMB" ]; then
              "$FFMPEG_STATIC" -hide_banner -loglevel error -y -ss 1 -i "$HEVC_FILE" \
                -frames:v 1 -q:v 2 -vf "scale=640:-2" "$HEVC_THUMB" 2>/dev/null || true
            fi
            if [ -s "$HEVC_THUMB" ]; then
              echo "HEVC_THUMB_FILE=$HEVC_THUMB" >> $GITHUB_ENV
              echo "HAS_HEVC_THUMB=1" >> $GITHUB_ENV
              echo "✅ Thumbnail HEVC dibuat: $HEVC_THUMB"
            else
              echo "HAS_HEVC_THUMB=0" >> $GITHUB_ENV
              echo "⚠️  Thumbnail HEVC gagal."
            fi
          else
            echo "⚠️  Encode HEVC gagal, dilewati (file asli tetap diupload)."
          fi

      - name: Notify Telegram — HEVC 10-bit (encode selesai)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ steps.inputs.outputs.chat_id }}
          FILENAME: ${{ steps.fname.outputs.filename }}
          HUMAN_DUR: ${{ steps.inputs.outputs.human_duration }}
          TAG: ${{ env.TAG }}
          JOB_STATUS: ${{ job.status }}
          REAL_DURATION: ${{ env.REAL_DURATION }}
          RESOLUTION: ${{ env.RESOLUTION }}
          VCODEC: ${{ env.VCODEC }}
          VBITRATE: ${{ env.VBITRATE }}
          FILE_SIZE: ${{ env.FILE_SIZE }}
          ORIG_BYTES: ${{ env.ORIG_BYTES }}
          THUMB_FILE: ${{ env.THUMB_FILE }}
          HAS_THUMB: ${{ env.HAS_THUMB }}
          HEVC_FILE: ${{ env.HEVC_FILE }}
          HEVC_SIZE: ${{ env.HEVC_SIZE }}
          HEVC_RES: ${{ env.HEVC_RES }}
          HEVC_VCODEC: ${{ env.HEVC_VCODEC }}
          HEVC_VBITRATE: ${{ env.HEVC_VBITRATE }}
          HEVC_DUR: ${{ env.HEVC_DUR }}
          HEVC_THUMB_FILE: ${{ env.HEVC_THUMB_FILE }}
          HAS_HEVC_THUMB: ${{ env.HAS_HEVC_THUMB }}
          TG_API_URL: ${{ secrets.TG_API_URL || 'http://localhost:8081' }}
          PHASE: hevc
        run: python3 scripts/notify.py

      - name: Bersihkan file video di disk runner (biar tidak tersisa)
        if: always()
        continue-on-error: true
        run: |
          echo "🧹 Menghapus sisa file video/thumb di disk runner..."
          F="${{ steps.fname.outputs.filename }}"
          # Hapus MP4 + JPG + segment + file .txt lokal (asset .txt sudah di release)
          rm -f "$F" 2>/dev/null
          rm -f "${{ env.HEVC_FILE }}" 2>/dev/null
          rm -f "${{ env.THUMB_FILE }}" 2>/dev/null
          rm -f "${{ env.HEVC_THUMB_FILE }}" 2>/dev/null
          rm -f segments/part-*.mp4 2>/dev/null
          rm -f "${F%.mp4}"*.txt 2>/dev/null
          rm -f *.mp4 *.jpg 2>/dev/null
          echo "✅ Disk runner dibersihkan (GitHub hanya menyimpan .txt di Release)"
